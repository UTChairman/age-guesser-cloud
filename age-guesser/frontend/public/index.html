<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Guesser Microservice</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            margin-bottom: 0.5rem;
            color: #38bdf8;
        }
        p {
            margin-bottom: 2rem;
            color: #94a3b8;
        }
        input {
            width: 90%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0ea5e9;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0284c7;
        }
        #result {
            margin-top: 1.5rem;
            font-size: 1.25rem;
            font-weight: bold;
            color: #10b981;
            min-height: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Age Guesser</h1>
        <p>Microservice Demo App</p>
        
        <input type="text" id="nameInput" placeholder="Enter your first name" />
        <button onclick="guessAge()">Guess My Age</button>

        <div id="result"></div>
    </div>

    <script>
        // We use window.location.hostname to easily switch between localhost and the deployed cloud URL
        const BACKEND_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000' 
            : 'http://' + window.location.hostname + ':5000'; // Adjust later for K8s if needed

        async function guessAge() {
            const nameInput = document.getElementById('nameInput').value;
            const resultDiv = document.getElementById('result');

            if (!nameInput) {
                resultDiv.style.color = '#ef4444';
                resultDiv.innerText = 'Please enter a name!';
                return;
            }

            resultDiv.style.color = '#38bdf8';
            resultDiv.innerText = 'Guessing...';

            try {
                const response = await fetch(`${BACKEND_URL}/api/guess?name=${nameInput}`);
                const data = await response.json();

                if (response.ok) {
                    resultDiv.style.color = '#10b981';
                    resultDiv.innerText = data.message;
                } else {
                    resultDiv.style.color = '#ef4444';
                    resultDiv.innerText = 'Error: ' + data.error;
                }
            } catch (error) {
                console.error('Error fetching age:', error);
                resultDiv.style.color = '#ef4444';
                resultDiv.innerText = 'Failed to connect to backend microservice.';
            }
        }
    </script>
</body>
</html>
